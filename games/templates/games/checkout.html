<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>

    <style>
        .checkout-card {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 10px;
            background: #1e1e1e;
            color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .checkout-card input {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px;
            border-radius: 5px;
            border: none;
        }

        .checkout-card button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            background: #4CAF50;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .checkout-card button:disabled {
            background: gray;
        }

        .cancel-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #ccc;
        }

        .game-image {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<div class="checkout-card">
    <h2>💳 Checkout</h2>

    <!-- Game Info -->
    <h3>{{ game.title }}</h3>
    <p><strong>Price:</strong> ${{ game.price }}</p>

    <!-- Image (moved OUTSIDE form) -->
    {% if game.image %}
        <img src="{{ game.image.url }}" class="game-image">
    {% endif %}

    <!-- Messages -->
    {% if messages %}
        {% for message in messages %}
            <p style="color: yellow;">{{ message }}</p>
        {% endfor %}
    {% endif %}

    <!-- Payment Form -->
    <form method="POST">
        {% csrf_token %}

        <label>Card Number</label>
        <input type="text" name="card_number"
               placeholder="1234 5678 9012 3456"
               maxlength="19"
               oninput="this.value = this.value.replace(/\D/g,'').replace(/(.{4})/g,'$1 ').trim()"
               required>

        <label>Expiry</label>
        <input type="text" name="expiry" placeholder="MM/YY" required>

        <label>CVV</label>
        <input type="text" name="cvv" placeholder="123" required>

        <!-- Submit Button -->
        <button type="submit"
                onclick="this.innerText='Processing...'; this.disabled=true; this.form.submit();">
            💳 Pay Now
        </button>

        <!-- Security note -->
        <p style="font-size:12px; color:lightgreen; text-align:center; margin-top:10px;">
            🔒 Secure Payment (Demo)
        </p>
    </form>

    <!-- Cancel -->
    <a href="{% url 'game_detail' game.id %}" class="cancel-link">
        ⬅ Cancel
    </a>
</div>

</body>
</html>
