<!DOCTYPE html>
<html>
<head>
    <title>Purchase Game</title>
</head>
<body>

<h1>💳 Purchase Game</h1>

<h2>{{ game.title }}</h2>
<p>Genre: {{ game.genre }}</p>
<p>Price: ${{ game.price }}</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit">✅ Confirm Purchase</button>
</form>

<br>

<a href="{% url 'game_detail' game_id=game.id %}">⬅ Cancel</a>

</body>
</html>
