<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Playlist</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .games-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .game-card {
            background: #1e293b;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .game-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
        }

        .remove-btn {
            background: red;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
        }

        .remove-btn:hover {
            background: darkred;
        }

        .empty-message {
            text-align: center;
            font-size: 18px;
            margin-top: 20px;
        }
    </style>
<!DOCTYPE html>
<html>
<head>
    <title>My Playlist</title>

    <style>
        body {
            background-color: #141414;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .games-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .game-card {
            background-color: #1f1f1f;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s ease;
            position: relative;
        }

        .game-card:hover {
            transform: scale(1.05);
        }

        .game-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .game-info {
            padding: 10px;
        }

        .game-info h3 {
            margin: 5px 0;
            font-size: 18px;
        }

        .game-info p {
            margin: 0;
            font-size: 14px;
            color: #bbb;
        }

        .remove-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: red;
            border: none;
            color: white;
            padding: 5px 8px;
            border-radius: 5px;
            cursor: pointer;
        }

        .remove-btn:hover {
            background: darkred;
        }

        .empty {
            color: #aaa;
        }

        a.back {
            display: inline-block;
            margin-top: 20px;
            color: white;
            text-decoration: none;
            background: red;
            padding: 10px 15px;
            border-radius: 5px;
        }

        a.back:hover {
            background: darkred;
        }
    </style>
</head>

<body>

<h1>🎮 My Playlist</h1>

{% if playlist.games.all %}
    <div class="games-container">

        {% for game in playlist.games.all %}
            <div class="game-card">

                {% if game.image %}
                    <img src="{{ game.image.url }}" alt="{{ game.title }}">
                {% endif %}

                <div class="game-info">
                    <h3>{{ game.title }}</h3>
                    <p>{{ game.genre }}</p>
                </div>

                <!-- REMOVE BUTTON -->
                <form method="POST" action="{% url 'remove_from_playlist' game.id %}">
                    {% csrf_token %}
                    <button class="remove-btn">❌</button>
                </form>

            </div>
        {% endfor %}

    </div>
{% else %}
    <p class="empty">No games in your playlist yet.</p>
{% endif %}

<a href="{% url 'home' %}" class="back">⬅ Back to Home</a>

</body>
</html>
    

</body>
</html>
